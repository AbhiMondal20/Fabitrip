<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabitrip — Explore · Book · Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1f36;--navy-light:#252b47;--coral:#ef4444;--coral-dark:#ef4444;--coral-light:#fff0ed;
  --cream:#faf9f7;--white:#ffffff;--g100:#f4f3f0;--g200:#e6e4de;--g300:#d1cfc8;--g400:#a8a59c;
  --g600:#6b6760;--g800:#302f2c;--gold:#d4a843;--shadow:0 2px 16px rgba(26,31,54,.10);--shadow-lg:0 8px 32px rgba(26,31,54,.16);
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--cream);color:var(--g800);min-height:100vh}
h1,h2,h3,.serif{font-family:'Cormorant Garamond',Georgia,serif}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select{font-family:inherit}
img{display:block;max-width:100%}
.hidden{display:none!important}

/* Header */
header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg)}
.header-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--white);letter-spacing:-0.5px;cursor:pointer}
.logo span{color:var(--coral)}
.header-nav{display:flex;gap:8px;align-items:center}
.header-nav button{color:rgba(255,255,255,.7);font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;transition:all .2s}
.header-nav button:hover{color:var(--white);background:rgba(255,255,255,.1)}
.btn-outline{border:1.5px solid var(--coral)!important;color:var(--coral)!important;padding:6px 16px!important;border-radius:6px!important}
.btn-outline:hover{background:var(--coral)!important;color:var(--white)!important}
.btn-solid{background:var(--coral)!important;color:var(--white)!important;padding:6px 16px!important;border-radius:6px!important}
.btn-solid:hover{background:var(--coral-dark)!important}
.currency-flag{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:13px}
.currency-flag img{height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.2)}

/* Tab Bar */
.tab-bar{background:var(--navy-light);border-top:1px solid rgba(255,255,255,.07)}
.tab-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;gap:0}
.tab-btn{display:flex;align-items:center;gap:8px;padding:14px 20px;font-size:14px;font-weight:500;color:rgba(255,255,255,.55);border-bottom:2.5px solid transparent;transition:all .2s;cursor:pointer}
.tab-btn svg{width:18px;height:18px;opacity:.7}
.tab-btn.active{color:var(--white);border-bottom-color:var(--coral)}
.tab-btn.active svg{opacity:1}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.85)}

/* Hero */
.hero{background:linear-gradient(135deg,var(--navy) 0%,#2a3258 100%);padding:40px 24px 48px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-inner{max-width:1280px;margin:0 auto;position:relative}
.hero h1{font-size:clamp(28px,4vw,46px);color:var(--white);font-weight:500;margin-bottom:8px;line-height:1.15}
.hero p{color:rgba(255,255,255,.6);font-size:15px;margin-bottom:28px;font-weight:300}

/* Search Box */
.search-box{background:var(--white);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-lg)}
.search-row{display:grid;gap:12px}
.search-stays{grid-template-columns:2fr 1fr 1fr 1fr auto}
.search-flights{grid-template-columns:1.2fr 1.2fr 1fr 1fr auto}
.search-cars{grid-template-columns:2fr 1fr 1fr auto}
.field{display:flex;flex-direction:column;gap:4px;position:relative}
.field label{font-size:11px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.6px}
.field input,.field select{border:1.5px solid var(--g200);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--g800);outline:none;transition:border-color .2s;width:100%}
.field input:focus,.field select:focus{border-color:var(--coral)}
.guests-ctrl{display:flex;align-items:center;gap:8px;border:1.5px solid var(--g200);border-radius:8px;padding:8px 12px}
.guests-ctrl button{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--g300);font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--g600);transition:all .2s}
.guests-ctrl button:hover{border-color:var(--coral);color:var(--coral)}
.guests-ctrl span{font-size:14px;font-weight:500;min-width:20px;text-align:center}
.search-btn{background:var(--coral);color:var(--white);border-radius:8px;padding:0 28px;font-size:15px;font-weight:600;height:48px;align-self:flex-end;transition:background .2s;white-space:nowrap}
.search-btn:hover{background:var(--coral-dark)}

/* Main content */
.main{max-width:1280px;margin:0 auto;padding:48px 24px}
.section-title{font-size:clamp(22px,3vw,30px);color:var(--navy);margin-bottom:24px;font-weight:500}
.section-title span{color:var(--coral)}

/* Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;margin-bottom:48px}
.card{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.card-img{width:100%;height:180px;object-fit:cover;position:relative}
.card-img-wrap{position:relative;overflow:hidden;height:180px}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-img-wrap img{transform:scale(1.05)}
.card-badge{position:absolute;top:12px;left:12px;background:var(--navy);color:var(--white);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.3px}
.card-fav{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .2s;z-index:2}
.card-fav:hover{transform:scale(1.1)}
.card-fav.active svg{fill:var(--coral);stroke:var(--coral)}
.card-body{padding:16px}
.card-name{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:4px;font-family:'Plus Jakarta Sans',sans-serif}
.card-place{font-size:13px;color:var(--g600);display:flex;align-items:center;gap:4px;margin-bottom:10px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-price{font-size:18px;font-weight:600;color:var(--coral)}
.card-price span{font-size:12px;font-weight:400;color:var(--g400)}
.card-rating{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:500;color:var(--g600)}
.star{color:var(--gold)}

/* Results Layout */
.results-layout{display:grid;grid-template-columns:260px 1fr;gap:28px;align-items:start}
.filter-panel{background:var(--white);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);position:sticky;top:88px}
.filter-title{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:20px;padding-bottom:12px;border-bottom:1.5px solid var(--g200)}
.filter-section{margin-bottom:24px}
.filter-section h4{font-size:12px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.filter-range{width:100%;margin-bottom:8px;accent-color:var(--coral)}
.filter-price-display{display:flex;justify-content:space-between;font-size:13px;color:var(--g600)}
.filter-check{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer}
.filter-check input[type=checkbox]{accent-color:var(--coral);width:15px;height:15px;cursor:pointer}
.filter-check label{font-size:13px;color:var(--g800);cursor:pointer}
.filter-star-row{display:flex;gap:8px;flex-wrap:wrap}
.star-filter-btn{padding:4px 14px;border-radius:20px;border:1.5px solid var(--g200);font-size:13px;font-weight:500;color:var(--g600);transition:all .2s;cursor:pointer}
.star-filter-btn.active,.star-filter-btn:hover{border-color:var(--coral);color:var(--coral);background:var(--coral-light)}
.clear-filters{width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1.5px solid var(--g200);font-size:13px;color:var(--g600);font-weight:500;transition:all .2s}
.clear-filters:hover{border-color:var(--coral);color:var(--coral)}

/* Sort Bar */
.sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.results-count{font-size:15px;color:var(--g600)}
.results-count strong{color:var(--navy)}
.sort-select{border:1.5px solid var(--g200);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--g800);outline:none;cursor:pointer;transition:border-color .2s}
.sort-select:focus{border-color:var(--coral)}

/* Detail Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,14,30,.65);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--white);border-radius:var(--radius-xl);max-width:800px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.modal-img{width:100%;height:280px;object-fit:cover}
.modal-body{padding:28px}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-name{font-size:26px;font-weight:500;color:var(--navy);line-height:1.2}
.modal-place{color:var(--g600);font-size:15px;margin-top:4px}
.modal-price-block{text-align:right}
.modal-price{font-size:28px;font-weight:600;color:var(--coral)}
.modal-price-sub{font-size:12px;color:var(--g400);margin-top:2px}
.modal-rating{display:flex;align-items:center;gap:6px;margin-bottom:20px}
.modal-rating .badge{background:var(--navy);color:var(--white);padding:4px 10px;border-radius:6px;font-size:13px;font-weight:600}
.modal-desc{font-size:15px;color:var(--g600);line-height:1.7;margin-bottom:24px}
.amenities-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:28px}
.amenity{display:flex;align-items:center;gap:8px;background:var(--g100);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--g800)}
.amenity svg{width:16px;height:16px;color:var(--coral);flex-shrink:0}
.modal-actions{display:flex;gap:12px}
.modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--white);box-shadow:0 2px 12px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;color:var(--g800);font-size:18px;z-index:10;transition:all .2s}
.modal-close:hover{background:var(--g100)}
.modal-img-wrap{position:relative}
.btn-primary{background:var(--coral);color:var(--white);border-radius:8px;padding:12px 28px;font-size:15px;font-weight:600;transition:background .2s;border:none;cursor:pointer}
.btn-primary:hover{background:var(--coral-dark)}
.btn-secondary{background:var(--white);color:var(--navy);border-radius:8px;padding:12px 28px;font-size:15px;font-weight:600;border:1.5px solid var(--g200);transition:all .2s;cursor:pointer}
.btn-secondary:hover{border-color:var(--navy)}

/* Booking Form */
.booking-form{max-width:560px;margin:0 auto}
.booking-form h2{font-size:26px;color:var(--navy);margin-bottom:6px}
.booking-form .sub{color:var(--g600);font-size:14px;margin-bottom:28px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:12px;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{border:1.5px solid var(--g200);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--g800);outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--coral)}
.booking-summary{background:var(--g100);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px}
.booking-summary h4{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:14px}
.summary-row{display:flex;justify-content:space-between;font-size:14px;color:var(--g600);margin-bottom:8px}
.summary-row.total{font-weight:600;color:var(--navy);font-size:16px;padding-top:10px;border-top:1.5px solid var(--g200);margin-top:6px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--g600);font-size:14px;font-weight:500;margin-bottom:24px;cursor:pointer;transition:color .2s}
.back-btn:hover{color:var(--coral)}

/* Confirmation */
.confirm-screen{text-align:center;padding:60px 24px;max-width:480px;margin:0 auto}
.confirm-icon{width:80px;height:80px;border-radius:50%;background:#e8f8ef;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.confirm-screen h2{font-size:30px;color:var(--navy);margin-bottom:12px}
.confirm-screen p{color:var(--g600);line-height:1.7;margin-bottom:8px}
.booking-ref{background:var(--g100);border-radius:10px;padding:16px;font-size:18px;font-weight:600;color:var(--navy);letter-spacing:2px;margin:20px 0}

/* Why Section */
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-bottom:48px}
.why-card{background:var(--white);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);transition:box-shadow .2s}
.why-card:hover{box-shadow:var(--shadow-lg)}
.why-icon{width:48px;height:48px;border-radius:12px;background:var(--coral-light);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.why-card h3{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px}
.why-card p{font-size:13px;color:var(--g400);line-height:1.6}

/* Offers */
.offers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:48px}
.offer-card{border-radius:var(--radius-lg);padding:28px;color:var(--white);position:relative;overflow:hidden}
.offer-card::before{content:'';position:absolute;right:-20px;bottom:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.offer-card h3{font-size:20px;font-family:'Cormorant Garamond',serif;margin-bottom:8px}
.offer-card p{font-size:13px;opacity:.85;margin-bottom:16px}
.offer-card .offer-btn{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);padding:6px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s}
.offer-card .offer-btn:hover{background:rgba(255,255,255,.35)}
.bg-coral{background:linear-gradient(135deg,#ef4444,#e03020)}
.bg-navy{background:linear-gradient(135deg,#1a1f36,#2a3258)}
.bg-teal{background:linear-gradient(135deg,#0d9488,#0f766e)}

/* Weekend Deals */
.weekend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-bottom:48px}
.dest-card{border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .25s,box-shadow .25s;position:relative}
.dest-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.dest-card img{width:100%;height:160px;object-fit:cover;display:block;transition:transform .4s}
.dest-card:hover img{transform:scale(1.07)}
.dest-card .dest-info{padding:14px}
.dest-card h3{font-size:15px;font-weight:600;color:var(--navy)}
.dest-card p{font-size:12px;color:var(--g400)}

/* Footer */
footer{background:var(--navy);color:rgba(255,255,255,.6);margin-top:40px}
.footer-inner{max-width:1280px;margin:0 auto;padding:48px 24px 24px;display:grid;grid-template-columns:2fr repeat(4,1fr);gap:40px}
.footer-brand .logo{font-size:22px;margin-bottom:10px;display:block}
.footer-brand p{font-size:13px;line-height:1.7;max-width:220px}
.footer-col h4{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--white);margin-bottom:14px}
.footer-col ul{list-style:none}
.footer-col li{font-size:13px;margin-bottom:8px;cursor:pointer;transition:color .2s}
.footer-col li:hover{color:var(--white)}
.footer-bottom{max-width:1280px;margin:0 auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.footer-bottom p{font-size:12px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--white);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Responsive */
@media(max-width:900px){
  .search-stays,.search-flights,.search-cars{grid-template-columns:1fr 1fr}
  .search-btn{grid-column:1/-1}
  .results-layout{grid-template-columns:1fr}
  .filter-panel{position:static}
  .footer-inner{grid-template-columns:repeat(2,1fr)}
  .footer-brand{grid-column:1/-1}
}
@media(max-width:600px){
  .header-nav .btn-outline,.currency-flag{display:none}
  .search-stays,.search-flights,.search-cars{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .modal-header{flex-direction:column;gap:12px}
  .modal-price-block{text-align:left}
}

/* View transitions */
.view{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--g400)}
.empty-state svg{margin:0 auto 16px;opacity:.4}
.empty-state h3{font-size:18px;color:var(--g600);margin-bottom:8px}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-inner">
    <div class="logo" onclick="goHome()">Fabi<span>trip</span></div>
    <div class="currency-flag">
      <img src="https://flagcdn.com/w40/in.png" alt="India">
      <span>INR</span>
    </div>
    <nav class="header-nav">
      <button onclick="showToast('Help Centre coming soon!')">Help</button>
      <button class="btn-outline" onclick="showToast('List your property feature coming soon!')">List Property</button>
      <button class="btn-solid" onclick="showToast('Sign in coming soon!')">Sign In</button>
    </nav>
  </div>
</header>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-inner">
    <button class="tab-btn active" id="tab-stays" onclick="switchTab('stays')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Stays
    </button>
    <button class="tab-btn" id="tab-flights" onclick="switchTab('flights')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      Flights
    </button>
    <button class="tab-btn" id="tab-cars" onclick="switchTab('cars')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zm10 0a2 2 0 11-4 0 2 2 0 014 0zm-14-5h14l-1.7-5.1A2 2 0 0015.4 6H8.6a2 2 0 00-1.9 1.4L5 12z"/></svg>
      Cars
    </button>
  </div>
</div>

<!-- App Root -->
<div id="app"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA

const S = {
  view: 'home',
  tab: 'stays',
  search: {destination:'',checkIn:'',checkOut:'',guests:2,from:'',to:'',date:'',cls:'Economy',pickup:'',pickupDate:'',pickupTime:''},
  filters: {maxPrice:60000,rating:0,types:[],amenities:[]},
  sort: 'popularity',
  selectedItem: null,
  showDetail: false,
  wishlist: new Set(),
  bookingData: {},
  bookingRef: '',
};

function getData(){return S.tab==='stays'?stays:S.tab==='flights'?flights:cars}

function getFiltered(){
  let data = getData();
  if(S.filters.maxPrice < 60000) data = data.filter(d=>d.price <= S.filters.maxPrice);
  if(S.filters.rating > 0) data = data.filter(d=>d.rating >= S.filters.rating);
  if(S.filters.types.length > 0) data = data.filter(d=>S.filters.types.includes(d.type));
  if(S.sort==='price_asc') data = [...data].sort((a,b)=>a.price-b.price);
  else if(S.sort==='price_desc') data = [...data].sort((a,b)=>b.price-a.price);
  else if(S.sort==='rating') data = [...data].sort((a,b)=>b.rating-a.rating);
  return data;
}

// RENDER ENGINE
// ============================================================
function render(){
  const app = document.getElementById('app');
  if(S.showDetail) renderDetail();
  else if(S.view==='home') app.innerHTML = renderHome();
  else if(S.view==='results') app.innerHTML = renderResults();
  else if(S.view==='booking') app.innerHTML = renderBooking();
  else if(S.view==='confirmation') app.innerHTML = renderConfirmation();
  attachEvents();
}

function renderResults(){
  const filtered = getFiltered();
  const allTypes = [...new Set(getData().map(d=>d.type))];
  const maxP = S.tab==='stays'?60000:S.tab==='flights'?70000:12000;
  return `
  <div class="view">
  <div class="hero" style="padding:24px">
    <div class="hero-inner">
      ${renderSearchForm()}
    </div>
  </div>
  <div class="main">
    <div class="results-layout">
      <aside class="filter-panel">
        <div class="filter-title">Filters</div>
        <div class="filter-section">
          <h4>Max Price <span style="color:var(--coral)">₹${Number(S.filters.maxPrice).toLocaleString('en-IN')}</span></h4>
          <input type="range" class="filter-range" min="0" max="${maxP}" step="500" value="${S.filters.maxPrice}" id="price-range" oninput="updatePriceFilter(this.value)">
          <div class="filter-price-display"><span>₹0</span><span>₹${maxP.toLocaleString('en-IN')}</span></div>
        </div>
        <div class="filter-section">
          <h4>Min Rating</h4>
          <div class="filter-star-row">
            ${[0,4,4.5,4.7,5].map(r=>`<button class="star-filter-btn ${S.filters.rating===r?'active':''}" onclick="setRating(${r})">${r===0?'All':'★'+r+'+'}</button>`).join('')}
          </div>
        </div>
        <div class="filter-section">
          <h4>Type</h4>
          ${allTypes.map(t=>`
            <label class="filter-check">
              <input type="checkbox" ${S.filters.types.includes(t)?'checked':''} onchange="toggleType('${t}')">
              <label>${t}</label>
            </label>`).join('')}
        </div>
        <button class="clear-filters" onclick="clearFilters()">Clear All Filters</button>
      </aside>
      <div>
        <div class="sort-bar">
          <div class="results-count"><strong>${filtered.length}</strong> results found</div>
          <select class="sort-select" onchange="setSort(this.value)">
            <option value="popularity" ${S.sort==='popularity'?'selected':''}>Most Popular</option>
            <option value="price_asc" ${S.sort==='price_asc'?'selected':''}>Price: Low to High</option>
            <option value="price_desc" ${S.sort==='price_desc'?'selected':''}>Price: High to Low</option>
            <option value="rating" ${S.sort==='rating'?'selected':''}>Highest Rated</option>
          </select>
        </div>
        ${filtered.length===0?`<div class="empty-state">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <h3>No results found</h3><p>Try adjusting your filters</p>
          <button class="btn-secondary" style="margin:16px auto 0;display:block" onclick="clearFilters()">Clear Filters</button>
        </div>`:
        `<div class="cards-grid">${filtered.map(item=>renderCard(item,true)).join('')}</div>`}
      </div>
    </div>
  </div>
  ${renderFooter()}
  </div>`;
}

}

// BOOKING VIEW
// ============================================================
function renderBooking(){
  const item = S.selectedItem;
  const priceLabel = S.tab==='stays'?'/ night':S.tab==='flights'?'one way':'/ day';
  const nights = S.tab==='stays'?2:1;
  const taxes = Math.round(item.price * nights * 0.12);
  const total = item.price * nights + taxes;
  return `
  <div class="view">
  <div class="main">
    <div class="booking-form">
      <div class="back-btn" onclick="openDetail('${item.id}')">
        ← Back to details
      </div>
      <h2>Complete Your Booking</h2>
      <p class="sub">You're booking <strong>${item.name}</strong> in ${item.place}</p>
      <div class="booking-summary">
        <h4>Booking Summary</h4>
        <div class="summary-row"><span>${item.name}</span><span>₹${item.price.toLocaleString('en-IN')} ${priceLabel}</span></div>
        ${S.tab==='stays'?`<div class="summary-row"><span>Duration</span><span>${nights} nights</span></div>`:''}
        <div class="summary-row"><span>Taxes & Fees (12%)</span><span>₹${taxes.toLocaleString('en-IN')}</span></div>
        <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString('en-IN')}</span></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input id="b-fname" placeholder="John" value="${S.bookingData.fname||''}"></div>
        <div class="form-group"><label>Last Name</label><input id="b-lname" placeholder="Doe" value="${S.bookingData.lname||''}"></div>
      </div>
      <div class="form-group"><label>Email Address</label><input id="b-email" type="email" placeholder="john@example.com" value="${S.bookingData.email||''}"></div>
      <div class="form-group"><label>Mobile Number</label><input id="b-phone" type="tel" placeholder="+91 9876543210" value="${S.bookingData.phone||''}"></div>
      ${S.tab==='stays'?`
      <div class="form-row">
        <div class="form-group"><label>Check In</label><input id="b-in" type="date" value="${S.search.checkIn}"></div>
        <div class="form-group"><label>Check Out</label><input id="b-out" type="date" value="${S.search.checkOut}"></div>
      </div>`:S.tab==='flights'?`<div class="form-group"><label>Travel Date</label><input id="b-date" type="date" value="${S.search.date}"></div>
      <div class="form-group"><label>Passport / ID Number</label><input id="b-passport" placeholder="A1234567" value="${S.bookingData.passport||''}"></div>`:`
      <div class="form-group"><label>Driver's License Number</label><input id="b-license" placeholder="DL-1234567890123" value="${S.bookingData.license||''}"></div>`}
      <h4 style="font-size:14px;font-weight:600;color:var(--navy);margin:20px 0 14px">Payment Details</h4>
      <div class="form-group"><label>Card Number</label><input id="b-card" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)"></div>
      <div class="form-row">
        <div class="form-group"><label>Expiry</label><input id="b-exp" placeholder="MM/YY" maxlength="5"></div>
        <div class="form-group"><label>CVV</label><input id="b-cvv" placeholder="123" maxlength="3" type="password"></div>
      </div>
      <button class="btn-primary" style="width:100%;margin-top:8px;padding:14px" onclick="confirmBooking()">
        Pay ₹${total.toLocaleString('en-IN')} Securely
      </button>
      <p style="text-align:center;font-size:12px;color:var(--g400);margin-top:12px">🔒 256-bit SSL encryption · Your data is safe</p>
    </div>
  </div>
  ${renderFooter()}
  </div>`;
}

// ============================================================
// CONFIRMATION VIEW
// ============================================================
function renderConfirmation(){
  return `
  <div class="view">
  <div class="main">
    <div class="confirm-screen">
      <div class="confirm-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Booking Confirmed!</h2>
      <p>Your booking has been confirmed. A confirmation has been sent to your email.</p>
      <div class="booking-ref">${S.bookingRef}</div>
      <p style="font-size:13px">Keep this reference number for your records.</p>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap">
        <button class="btn-primary" onclick="goHome()">Back to Home</button>
        <button class="btn-secondary" onclick="showToast('Booking details sent to email!')">Email Details</button>
      </div>
    </div>
  </div>
  ${renderFooter()}
  </div>`;
}

// ============================================================
// FOOTER
// ============================================================
function renderFooter(){
  return `
  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="logo">Fabi<span>trip</span></span>
        <p>Your trusted travel companion for hotels, flights, and car rentals across India and the world.</p>
      </div>
      ${[['Support',['Help Center','Contact Us','FAQ','Cancellation Policy']],
         ['Company',['About Us','Careers','Press','Blog']],
         ['Partners',['List Property','Affiliate Program','API Access','Corporate Travel']],
         ['Legal',['Privacy Policy','Terms of Service','Cookie Policy','Sitemap']]].map(([h,items])=>`
        <div class="footer-col">
          <h4>${h}</h4>
          <ul>${items.map(i=>`<li onclick="showToast('${i} coming soon!')">${i}</li>`).join('')}</ul>
        </div>`).join('')}
    </div>
    <div class="footer-bottom">
      <p>© 2026 Fabitrip. All rights reserved.</p>
      <p>Made with ♥ in India</p>
    </div>
  </footer>`;
}

// ============================================================
// ACTIONS
// ============================================================
function switchTab(tab){
  S.tab = tab;
  S.view = 'home';
  S.showDetail = false;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

function changeGuests(delta){
  S.search.guests = Math.max(1, Math.min(10, S.search.guests + delta));
  const el = document.getElementById('g-count');
  if(el) el.textContent = S.search.guests;
}

function readSearchInputs(){
  if(S.tab==='stays'){
    S.search.destination = document.getElementById('s-dest')?.value || S.search.destination;
    S.search.checkIn = document.getElementById('s-in')?.value || '';
    S.search.checkOut = document.getElementById('s-out')?.value || '';
  } else if(S.tab==='flights'){
    S.search.from = document.getElementById('f-from')?.value || S.search.from;
    S.search.to = document.getElementById('f-to')?.value || S.search.to;
    S.search.date = document.getElementById('f-date')?.value || '';
    S.search.cls = document.getElementById('f-cls')?.value || 'Economy';
  } else {
    S.search.pickup = document.getElementById('c-pickup')?.value || S.search.pickup;
    S.search.pickupDate = document.getElementById('c-date')?.value || '';
    S.search.pickupTime = document.getElementById('c-time')?.value || '';
  }
}

function doSearch(){
  readSearchInputs();
  S.view = 'results';
  S.showDetail = false;
  S.filters = {maxPrice:S.tab==='stays'?60000:S.tab==='flights'?70000:12000,rating:0,types:[],amenities:[]};
  S.sort = 'popularity';
  render();
  window.scrollTo(0,0);
}

function searchDestination(dest){
  S.search.destination = dest;
  doSearch();
}

function openDetail(id){
  S.selectedItem = getData().find(d=>d.id===id) || S.selectedItem;
  S.showDetail = true;
  // Re-render base first if needed
  if(S.view==='home') document.getElementById('app').innerHTML = renderHome();
  else document.getElementById('app').innerHTML = renderResults();
  renderDetail();
  attachEvents();
  document.body.style.overflow = 'hidden';
}

function closeDetail(){
  S.showDetail = false;
  document.body.style.overflow = '';
  document.getElementById('modal-overlay')?.remove();
}

function closeDetailOnBg(e){
  if(e.target.id==='modal-overlay') closeDetail();
}

function goToBooking(){
  closeDetail();
  S.view = 'booking';
  S.showDetail = false;
  document.body.style.overflow = '';
  render();
  window.scrollTo(0,0);
}

function goHome(){
  S.view = 'home';
  S.showDetail = false;
  document.body.style.overflow = '';
  render();
  window.scrollTo(0,0);
}

function toggleFav(event, id){
  event.stopPropagation();
  if(S.wishlist.has(id)){S.wishlist.delete(id);showToast('Removed from wishlist');}
  else{S.wishlist.add(id);showToast('Added to wishlist ❤️');}
  render();
}

function toggleFavModal(id){
  if(S.wishlist.has(id)){S.wishlist.delete(id);showToast('Removed from wishlist');}
  else{S.wishlist.add(id);showToast('Added to wishlist ❤️');}
}

function updatePriceFilter(val){
  S.filters.maxPrice = parseInt(val);
  document.querySelector('.filter-price-display')?.querySelectorAll('span')[0];
  const display = document.querySelector('.filter-section h4[id]');
  // Update display inline
  const h4s = document.querySelectorAll('.filter-section h4');
  if(h4s[0]) h4s[0].innerHTML = `Max Price <span style="color:var(--coral)">₹${Number(val).toLocaleString('en-IN')}</span>`;
  updateResultsCount();
}

function updateResultsCount(){
  const filtered = getFiltered();
  const el = document.querySelector('.results-count');
  if(el) el.innerHTML = `<strong>${filtered.length}</strong> results found`;
  const grid = document.querySelector('.cards-grid');
  if(grid) grid.innerHTML = filtered.map(item=>renderCard(item,true)).join('');
  attachCardEvents();
}

function setRating(r){
  S.filters.rating = r;
  document.querySelectorAll('.star-filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  updateResultsCount();
}

function toggleType(type){
  if(S.filters.types.includes(type)) S.filters.types = S.filters.types.filter(t=>t!==type);
  else S.filters.types.push(type);
  updateResultsCount();
}

function clearFilters(){
  S.filters = {maxPrice:S.tab==='stays'?60000:S.tab==='flights'?70000:12000,rating:0,types:[],amenities:[]};
  render();
}

function setSort(val){
  S.sort = val;
  updateResultsCount();
}

function confirmBooking(){
  const fname = document.getElementById('b-fname')?.value;
  const lname = document.getElementById('b-lname')?.value;
  const email = document.getElementById('b-email')?.value;
  const card = document.getElementById('b-card')?.value;
  if(!fname||!lname||!email||!card){showToast('Please fill all required fields');return;}
  if(card.replace(/\s/g,'').length < 16){showToast('Please enter a valid card number');return;}
  S.bookingData = {fname,lname,email};
  S.bookingRef = 'FT' + Date.now().toString().slice(-8).toUpperCase();
  S.view = 'confirmation';
  render();
  window.scrollTo(0,0);
}

function formatCard(input){
  let v = input.value.replace(/\D/g,'').substring(0,16);
  input.value = v.replace(/(.{4})/g,'$1 ').trim();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function attachEvents(){
  attachCardEvents();
}

function attachCardEvents(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', function(e){
      if(!e.target.closest('.card-fav')) return;
    });
  });
}

// Init
render();
</script>
</body>
</html>
